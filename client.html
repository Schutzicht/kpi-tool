<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campagne Rapportage — Agensea</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Client portal overrides */
        .client-hero {
            text-align: center;
            padding: 48px 40px 32px;
        }
        .client-hero .logo {
            font-size: 1rem;
            margin-bottom: 24px;
            color: var(--muted);
        }
        .client-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }
        .client-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .client-period {
            font-size: 0.75rem;
            color: var(--muted);
        }
        .client-context {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        .client-ctx-item {
            text-align: center;
        }
        .client-ctx-label {
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            display: block;
            margin-bottom: 2px;
        }
        .client-ctx-value {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
        }
        /* Read-only table: no editable styling */
        .kpi-table .ro-value {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.9rem;
            font-variant-numeric: tabular-nums;
        }
        .client-footer {
            text-align: center;
            padding: 40px 20px 60px;
        }
        .client-footer p {
            font-size: 0.7rem;
            color: var(--muted);
        }
        .client-error {
            text-align: center;
            padding: 120px 40px;
        }
        .client-error h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        .client-error p {
            color: var(--text-secondary);
        }

        @media print {
            .header { display: none !important; }
            .client-hero { padding-top: 0; }
            .client-footer { display: none; }
        }
    </style>
</head>
<body>

    <div class="grain"></div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">agensea<span class="logo-accent">.</span></div>
            <div class="header-label">Campagne Rapportage</div>
        </div>
    </header>

    <main class="main" id="clientMain">
        <div class="client-error" id="clientError" style="display:none;">
            <h2>Geen rapportage gevonden</h2>
            <p>Deze link bevat geen geldige campagnedata. Neem contact op met je accountmanager.</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://lkyyggkzdptfvlgwjeur.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxreXlnZ2t6ZHB0ZnZsZ3dqZXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MTk5MDAsImV4cCI6MjA5MTE5NTkwMH0.JSQtJRXVaoF5y6C1G8GPdI21cpqJ8_-wr1Def8tcs-Q';
        const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // ── KPI Definitions (all possible) ──
        const ALL_KPIS = {
            ctr: { id: 'ctr', name: 'CTR', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            cpc: { id: 'cpc', name: 'CPC', unit: '€', format: 'currency', direction: 'lower_is_better' },
            cpm: { id: 'cpm', name: 'CPM', unit: '€', format: 'currency', direction: 'lower_is_better' },
            conversieratio: { id: 'conversieratio', name: 'Conversieratio', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            cpl: { id: 'cpl', name: 'CPL', unit: '€', format: 'currency', direction: 'lower_is_better' },
            video_view_rate: { id: 'video_view_rate', name: 'Video view rate', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            engagement_rate: { id: 'engagement_rate', name: 'Engagement rate', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            volgers: { id: 'volgers', name: 'Nieuwe volgers', unit: 'volgers', format: 'number', direction: 'higher_is_better' },
            cpv: { id: 'cpv', name: 'CPV', unit: '€', format: 'currency', direction: 'lower_is_better' },
            bounce_rate: { id: 'bounce_rate', name: 'Bouncepercentage', unit: '%', format: 'percentage', direction: 'lower_is_better' },
            time_on_page: { id: 'time_on_page', name: 'Tijd op pagina', unit: 'sec', format: 'number', direction: 'higher_is_better' },
        };

        function formatValue(value, format) {
            if (value === null || value === undefined) return '—';
            switch (format) {
                case 'number': return Number(value).toLocaleString('nl-NL');
                case 'percentage': return Number(value).toFixed(2).replace('.', ',') + '%';
                case 'currency': return '€ ' + Number(value).toFixed(2).replace('.', ',');
                default: return String(value);
            }
        }

        function calculateDeviation(actual, target, direction) {
            if (actual === null || target === null || target === 0) return null;
            if (direction === 'higher_is_better') return ((actual - target) / target) * 100;
            return ((target - actual) / target) * 100;
        }

        function getStatusClass(dev) {
            if (dev === null) return 'neutral';
            if (dev >= 0) return 'green';
            if (dev >= -20) return 'orange';
            return 'red';
        }

        function getStatusLabel(cls) {
            return { green: 'Op target', orange: 'Aandacht', red: 'Kritiek', neutral: 'Geen data' }[cls];
        }

        function parseValue(str) {
            if (!str || str === '—') return null;
            let cleaned = String(str).replace(/[€%×\s]/g, '');
            const lastDot = cleaned.lastIndexOf('.');
            const lastComma = cleaned.lastIndexOf(',');
            if (lastComma > lastDot) cleaned = cleaned.replace(/\./g, '').replace(',', '.');
            else if (lastDot > lastComma) cleaned = cleaned.replace(/,/g, '');
            else cleaned = cleaned.replace(',', '.');
            const num = parseFloat(cleaned);
            return isNaN(num) ? null : num;
        }

        function formatDate(str) {
            if (!str) return '';
            return new Date(str).toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        // State for write-back
        let shareToken = null;
        let fullCampaign = null;

        async function saveBusinessKpis() {
            if (!sb || !shareToken || !fullCampaign) return false;
            try {
                const { error } = await sb.from('campaigns')
                    .update({ data: fullCampaign, updated_at: new Date().toISOString() })
                    .eq('share_token', shareToken);
                if (error) { console.warn('Save failed:', error); return false; }
                return true;
            } catch (e) { console.warn('Save failed:', e); return false; }
        }

        // ── Parse & Render ──
        document.addEventListener('DOMContentLoaded', async () => {
            const hash = window.location.hash.slice(1);
            if (!hash) {
                document.getElementById('clientError').style.display = '';
                return;
            }

            let data;
            let editable = false;

            if (hash.startsWith('data:')) {
                // Legacy: base64-encoded data in URL
                try {
                    data = JSON.parse(decodeURIComponent(escape(atob(hash.slice(5)))));
                } catch (e) {
                    document.getElementById('clientError').style.display = '';
                    return;
                }
            } else {
                // Short token: fetch from Supabase
                if (!sb) {
                    document.getElementById('clientError').style.display = '';
                    return;
                }
                try {
                    const { data: row, error } = await sb.from('campaigns').select('data').eq('share_token', hash).single();
                    if (error || !row) {
                        document.getElementById('clientError').style.display = '';
                        return;
                    }
                    // Map campaign data to client format
                    const c = row.data;
                    shareToken = hash;
                    fullCampaign = c;
                    editable = true;
                    if (!c.businessKpis) c.businessKpis = { productValue: null, goal: null, budget: null };
                    data = {
                        n: c.name,
                        c: c.client,
                        sd: c.startDate,
                        ed: c.endDate,
                        ctx: c.context,
                        bk: c.businessKpis,
                        kpis: c.kpis.map(k => ({ id: k.id, t: k.target, a: k.actual })),
                    };
                } catch (e) {
                    document.getElementById('clientError').style.display = '';
                    return;
                }
            }

            const main = document.getElementById('clientMain');

            // Hero
            let periodText = '';
            if (data.sd && data.ed) {
                periodText = `${formatDate(data.sd)} — ${formatDate(data.ed)}`;
            }

            let contextHtml = '';
            if (data.ctx) {
                const items = [];
                if (data.ctx.audienceSize) items.push({ label: 'Doelgroep', value: data.ctx.audienceSize });
                if (data.ctx.budget) items.push({ label: 'Budget', value: data.ctx.budget });
                if (data.ctx.platform) items.push({ label: 'Platform', value: data.ctx.platform });
                if (items.length > 0) {
                    contextHtml = `<div class="client-context">${items.map(i =>
                        `<div class="client-ctx-item"><span class="client-ctx-label">${i.label}</span><span class="client-ctx-value">${i.value}</span></div>`
                    ).join('')}</div>`;
                }
            }

            // Calculate status counts
            let greens = 0, oranges = 0, reds = 0, total = 0;
            data.kpis.forEach(k => {
                const def = ALL_KPIS[k.id];
                if (!def || k.a === null) return;
                total++;
                const dev = calculateDeviation(k.a, k.t, def.direction);
                const cls = getStatusClass(dev);
                if (cls === 'green') greens++;
                else if (cls === 'orange') oranges++;
                else if (cls === 'red') reds++;
            });

            // Summary
            let badgeCls = '', badgeText = '', summaryText = '';
            const score = total > 0 ? greens / total : 0;
            if (total === 0) {
                badgeText = 'Geen data';
                summaryText = 'Er zijn nog geen werkelijke resultaten ingevuld.';
            } else if (score >= 0.8 && reds === 0) {
                badgeCls = 'good';
                badgeText = 'Goed op koers';
                summaryText = `De campagne presteert sterk. ${greens} van de ${total} KPI's zitten op of boven target.`;
            } else if (reds >= 2 || score < 0.4) {
                badgeCls = 'critical';
                badgeText = 'Actie vereist';
                summaryText = `De campagne vraagt aandacht. ${reds} KPI('s) scoren onder target.`;
            } else {
                badgeCls = 'warning';
                badgeText = 'Aandachtspunten';
                summaryText = `De campagne presteert gemiddeld. ${greens} KPI('s) op target, ${oranges + reds} vragen aandacht.`;
            }

            // Build table rows
            let tableRows = '';
            data.kpis.forEach(k => {
                const def = ALL_KPIS[k.id];
                if (!def) return;

                const dev = calculateDeviation(k.a, k.t, def.direction);
                const cls = getStatusClass(dev);
                const label = getStatusLabel(cls);

                let devFormatted = '—';
                let devCls = 'neutral-val';
                if (dev !== null) {
                    const sign = dev >= 0 ? '+' : '';
                    devFormatted = sign + dev.toFixed(1).replace('.', ',') + '%';
                    if (dev >= 0) devCls = 'positive';
                    else if (dev >= -20) devCls = 'warning';
                    else devCls = 'negative';
                }

                tableRows += `
                    <tr>
                        <td><span class="kpi-name">${def.name}</span><span class="kpi-unit">${def.unit}</span></td>
                        <td><span class="ro-value">${formatValue(k.t, def.format)}</span></td>
                        <td><span class="ro-value">${k.a !== null ? formatValue(k.a, def.format) : '—'}</span></td>
                        <td><span class="status-pill ${cls}"><span class="status-dot"></span>${label}</span></td>
                        <td><span class="deviation ${devCls}">${devFormatted}</span></td>
                    </tr>
                `;
            });

            // Business KPIs block
            const bk = data.bk || { productValue: null, goal: null, budget: null };
            const bizValue = (v, fmt) => v !== null && v !== undefined ? formatValue(v, fmt) : '';
            const bizBlock = `
                <section class="section-heading">
                    <h2 class="section-title">Business KPI's</h2>
                    <p class="section-subtitle">${editable ? 'Vul hieronder je commerciële doelen in. CAC en ROAS worden automatisch berekend.' : 'Commerciële doelen van de campagne.'}</p>
                </section>
                <section class="business-kpis">
                    <div class="biz-grid">
                        <div class="biz-field">
                            <label class="label-small">PRODUCTWAARDE</label>
                            <input type="text" id="cliBizProductValue" class="biz-input" placeholder="€ 0,00" value="${bizValue(bk.productValue, 'currency')}" ${editable ? '' : 'readonly'}>
                            <span class="biz-hint">Gemiddelde orderwaarde per sale/lead</span>
                        </div>
                        <div class="biz-field">
                            <label class="label-small">DOEL (AANTAL)</label>
                            <input type="text" id="cliBizGoal" class="biz-input" placeholder="bijv. 25" value="${bizValue(bk.goal, 'number')}" ${editable ? '' : 'readonly'}>
                            <span class="biz-hint">Gewenst aantal sales of leads</span>
                        </div>
                        <div class="biz-field">
                            <label class="label-small">BUDGET</label>
                            <input type="text" id="cliBizBudget" class="biz-input" placeholder="€ 0,00" value="${bizValue(bk.budget, 'currency')}" ${editable ? '' : 'readonly'}>
                            <span class="biz-hint">Totaal advertentiebudget</span>
                        </div>
                        <div class="biz-field biz-field-derived">
                            <label class="label-small">MAX. CAC</label>
                            <span class="biz-derived" id="cliBizCac">—</span>
                            <span class="biz-hint">Budget ÷ Doel</span>
                        </div>
                        <div class="biz-field biz-field-derived">
                            <label class="label-small">ROAS-TARGET</label>
                            <span class="biz-derived" id="cliBizRoas">—</span>
                            <span class="biz-hint">(Doel × Productwaarde) ÷ Budget</span>
                        </div>
                    </div>
                    ${editable ? '<p class="biz-save-status" id="cliBizStatus"></p>' : ''}
                </section>
            `;

            main.innerHTML = `
                <div class="client-hero">
                    <div class="logo">agensea<span class="logo-accent">.</span></div>
                    ${data.c ? `<p class="client-subtitle">${data.c}</p>` : ''}
                    <h1 class="client-title">${data.n}</h1>
                    ${periodText ? `<p class="client-period">${periodText}</p>` : ''}
                    ${contextHtml}
                </div>

                ${bizBlock}

                <section class="summary-card">
                    <div class="summary-header">
                        <h2 class="summary-title">Samenvatting</h2>
                        <div class="summary-badge ${badgeCls}">${badgeText}</div>
                    </div>
                    <p class="summary-text">${summaryText}</p>
                    <div class="summary-stats">
                        <div class="stat-item">
                            <span class="stat-value">${greens}</span>
                            <span class="stat-label status-green-text">Op target</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${oranges}</span>
                            <span class="stat-label status-orange-text">Aandachtspunt</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${reds}</span>
                            <span class="stat-label status-red-text">Kritiek</span>
                        </div>
                    </div>
                </section>

                <section class="section-heading">
                    <h2 class="section-title">Campaign KPI's</h2>
                    <p class="section-subtitle">Prestaties van de advertentiecampagne.</p>
                </section>

                <section class="table-wrapper">
                    <table class="kpi-table">
                        <thead>
                            <tr>
                                <th style="width:15%">KPI</th>
                                <th style="width:15%">Target</th>
                                <th style="width:15%">Werkelijk</th>
                                <th style="width:15%">Status</th>
                                <th style="width:15%">Afwijking</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </section>

                <div class="client-footer">
                    <p>Rapportage opgesteld door <strong>Agensea</strong> — Voor vragen, neem contact op met je accountmanager.</p>
                </div>
            `;

            // Update page title
            document.title = `${data.n} — Rapportage — Agensea`;

            // ── Business KPI interactivity ──
            function updateBizDerived() {
                const cacEl = document.getElementById('cliBizCac');
                const roasEl = document.getElementById('cliBizRoas');
                if (bk.budget && bk.goal && bk.goal > 0) {
                    cacEl.textContent = formatValue(bk.budget / bk.goal, 'currency');
                } else {
                    cacEl.textContent = '—';
                }
                if (bk.productValue && bk.goal && bk.budget && bk.budget > 0) {
                    const roas = (bk.goal * bk.productValue) / bk.budget;
                    roasEl.textContent = roas.toFixed(2).replace('.', ',') + '×';
                } else {
                    roasEl.textContent = '—';
                }
            }
            updateBizDerived();

            if (editable) {
                const fields = [
                    { id: 'cliBizProductValue', key: 'productValue', format: 'currency' },
                    { id: 'cliBizGoal', key: 'goal', format: 'number' },
                    { id: 'cliBizBudget', key: 'budget', format: 'currency' },
                ];
                const statusEl = document.getElementById('cliBizStatus');
                fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    el.addEventListener('focus', (e) => {
                        const raw = bk[f.key];
                        e.target.value = raw !== null && raw !== undefined ? raw : '';
                        e.target.select();
                    });
                    el.addEventListener('blur', async (e) => {
                        const parsed = parseValue(e.target.value);
                        bk[f.key] = parsed;
                        fullCampaign.businessKpis = bk;
                        e.target.value = parsed !== null ? formatValue(parsed, f.format) : '';
                        updateBizDerived();
                        statusEl.textContent = 'Opslaan…';
                        statusEl.className = 'biz-save-status saving';
                        const ok = await saveBusinessKpis();
                        statusEl.textContent = ok ? 'Opgeslagen ✓' : 'Opslaan mislukt';
                        statusEl.className = 'biz-save-status ' + (ok ? 'saved' : 'error');
                        setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'biz-save-status'; }, 2500);
                    });
                    el.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.target.blur(); });
                });
            }
        });
    </script>
</body>
</html>
