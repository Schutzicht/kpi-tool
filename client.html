<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="style.css">
    <style>
        /* Client portal overrides */
        .client-hero {
            text-align: center;
            padding: 48px 40px 32px;
        }
        .client-hero .logo {
            font-size: 1rem;
            margin-bottom: 24px;
            color: var(--muted);
        }
        .client-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }
        .client-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .client-period {
            font-size: 0.75rem;
            color: var(--muted);
        }
        .client-context {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        .client-ctx-item {
            text-align: center;
        }
        .client-ctx-label {
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            display: block;
            margin-bottom: 2px;
        }
        .client-ctx-value {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
        }
        /* Read-only table: no editable styling */
        .kpi-table .ro-value {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.9rem;
            font-variant-numeric: tabular-nums;
        }
        .client-footer {
            text-align: center;
            padding: 40px 20px 60px;
        }
        .client-footer p {
            font-size: 0.7rem;
            color: var(--muted);
        }
        .client-error {
            text-align: center;
            padding: 120px 40px;
        }
        .client-error h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        .client-error p {
            color: var(--text-secondary);
        }

        @media print {
            .header { display: none !important; }
            .client-hero { padding-top: 0; }
            .client-footer { display: none; }
        }
    </style>
</head>
<body>

            <div class="logo">agensea<span class="logo-accent">.</span></div>
            <div class="header-right">
                <div class="lang-switch">
                    <button class="lang-btn" data-lang="nl">NL</button>
                    <button class="lang-btn" data-lang="en">EN</button>

                summary_good: (g, t) => `The campaign is performing strongly. ${g} out of ${t} KPIs are on or above target.`,
                summary_critical: (r) => `The campaign needs attention. ${r} KPI(s) are below target.`,
                summary_warning: (g, rest) => `The campaign is performing average. ${g} KPI(s) on target, ${rest} need attention.`,
                stat_on_target: 'On target',
                stat_attention: 'Attention',
                stat_critical: 'Critical',
                status_on_target: 'On target',
                status_attention: 'Attention',
                status_critical: 'Critical',
                status_no_data: 'No data',
                kpi_col_kpi: 'KPI',
                kpi_col_target: 'Target',
                kpi_col_actual: 'Actual',
                kpi_col_status: 'Status',
                kpi_col_deviation: 'Deviation',
                campaign_kpis_title: 'Campaign KPIs',
                campaign_kpis_subtitle: 'Performance of the ad campaign.',
                ctx_audience: 'Audience',
                ctx_budget: 'Budget',
                ctx_platform: 'Platform',
                footer_text: 'Report prepared by <strong>Agensea</strong> — For questions, please contact your account manager.',
            },
        };
        let currentLang = localStorage.getItem('agensea_lang') || 'nl';
        function t(key, ...args) {
            const dict = I18N[currentLang] || I18N.nl;
            const v = dict[key];
            if (typeof v === 'function') return v(...args);
            return v !== undefined ? v : (I18N.nl[key] || key);
        }

        const SUPABASE_URL = 'https://lkyyggkzdptfvlgwjeur.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxreXlnZ2t6ZHB0ZnZsZ3dqZXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MTk5MDAsImV4cCI6MjA5MTE5NTkwMH0.JSQtJRXVaoF5y6C1G8GPdI21cpqJ8_-wr1Def8tcs-Q';
        const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // ── KPI Definitions (all possible) ──
        const ALL_KPIS = {
            ctr: { id: 'ctr', name: 'CTR', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            cpc: { id: 'cpc', name: 'CPC', unit: '€', format: 'currency', direction: 'lower_is_better' },
            cpm: { id: 'cpm', name: 'CPM', unit: '€', format: 'currency', direction: 'lower_is_better' },
            conversieratio: { id: 'conversieratio', name: 'Conversieratio', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            cpl: { id: 'cpl', name: 'CPL', unit: '€', format: 'currency', direction: 'lower_is_better' },
            video_view_rate: { id: 'video_view_rate', name: 'Video view rate', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            engagement_rate: { id: 'engagement_rate', name: 'Engagement rate', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            volgers: { id: 'volgers', name: 'Nieuwe volgers', unit: 'volgers', format: 'number', direction: 'higher_is_better' },
            cpv: { id: 'cpv', name: 'CPV', unit: '€', format: 'currency', direction: 'lower_is_better' },
            bounce_rate: { id: 'bounce_rate', name: 'Bouncepercentage', unit: '%', format: 'percentage', direction: 'lower_is_better' },
            time_on_page: { id: 'time_on_page', name: 'Tijd op pagina', unit: 'sec', format: 'number', direction: 'higher_is_better' },
        };

        function formatValue(value, format) {
            if (value === null || value === undefined) return '—';
            switch (format) {
                case 'number': return Number(value).toLocaleString('nl-NL');
                case 'percentage': return Number(value).toFixed(2).replace('.', ',') + '%';
                case 'currency': return '€ ' + Number(value).toFixed(2).replace('.', ',');
                default: return String(value);
            }
        }

        function calculateDeviation(actual, target, direction) {
            if (actual === null || target === null || target === 0) return null;
            if (direction === 'higher_is_better') return ((actual - target) / target) * 100;
            return ((target - actual) / target) * 100;
        }

        function getStatusClass(dev) {
            if (dev === null) return 'neutral';
            if (dev >= 0) return 'green';
            if (dev >= -20) return 'orange';
            return 'red';
        }

        function getStatusLabel(cls) {
            return { green: t('status_on_target'), orange: t('status_attention'), red: t('status_critical'), neutral: t('status_no_data') }[cls];
        }

        // English KPI overrides (NL is source; short names translated on the fly)
        const KPI_EN = {
            ctr:             { name: 'CTR',             unit: '%' },
            cpc:             { name: 'CPC',             unit: '€' },
            cpm:             { name: 'CPM',             unit: '€' },
            conversieratio:  { name: 'Conversion rate', unit: '%' },
            cpl:             { name: 'CPL',             unit: '€' },
            video_view_rate: { name: 'Video view rate', unit: '%' },
            engagement_rate: { name: 'Engagement rate', unit: '%' },
            volgers:         { name: 'New followers',   unit: 'followers' },
            cpv:             { name: 'CPV',             unit: '€' },
            bounce_rate:     { name: 'Bounce rate',     unit: '%' },
            time_on_page:    { name: 'Time on page',    unit: 'sec' },
        };
        function localizedKpi(def) {
            if (currentLang === 'en' && KPI_EN[def.id]) {
                return { ...def, name: KPI_EN[def.id].name, unit: KPI_EN[def.id].unit };
            }
            return def;
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
        function chips(str) {
            if (!str) return '';
            return String(str).split(/[,;\n]/).map(s => s.trim()).filter(Boolean)
                .map(v => `<span class="chip">${escapeHtml(v)}</span>`).join('');
        }
        // Render read-only must-also-match blocks: array of {attribute, values} OR legacy string
        function renderMamBlocksRO(data) {
            let blocks = [];
            if (Array.isArray(data)) {
                blocks = data.filter(b => (b.attribute && b.attribute.trim()) || (b.values && b.values.trim()));
            } else if (typeof data === 'string' && data.trim()) {
                blocks = String(data).split(/\n/).map(line => {
                    const idx = line.indexOf(':');
                    if (idx === -1) return line.trim() ? { attribute: '', values: line.trim() } : null;
                    return { attribute: line.slice(0, idx).trim(), values: line.slice(idx + 1).trim() };
                }).filter(Boolean);
            }
            if (blocks.length === 0) return '';
            return blocks.map((b, i) => `
                <div class="mam-block">
                    <div class="mam-block-header">
                        <span class="mam-connector">${i === 0 ? t('mam_and_label') : t('mam_and_connector')}</span>
                        ${b.attribute ? `<span class="mam-label">${escapeHtml(b.attribute)}</span>` : ''}
                    </div>
                    <div class="chip-row">${chips(b.values)}</div>
                </div>
            `).join('');
        }

        function parseValue(str) {
            if (!str || str === '—') return null;
            let cleaned = String(str).replace(/[€%×\s]/g, '');
            const lastDot = cleaned.lastIndexOf('.');
            const lastComma = cleaned.lastIndexOf(',');
            if (lastComma > lastDot) cleaned = cleaned.replace(/\./g, '').replace(',', '.');
            else if (lastDot > lastComma) cleaned = cleaned.replace(/,/g, '');
            else cleaned = cleaned.replace(',', '.');
            const num = parseFloat(cleaned);
            return isNaN(num) ? null : num;
        }

        function formatDate(str) {
            if (!str) return '';
            return new Date(str).toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        // State for write-back
        let shareToken = null;
        let fullCampaign = null;

        async function saveBusinessKpis() {
            if (!sb || !shareToken || !fullCampaign) return false;
            try {
                const { error } = await sb.from('campaigns')
                    .update({ data: fullCampaign, updated_at: new Date().toISOString() })
                    .eq('share_token', shareToken);
                if (error) { console.warn('Save failed:', error); return false; }
                return true;
            } catch (e) { console.warn('Save failed:', e); return false; }
        }

        // ── Parse & Render ──
        let cachedRenderFn = null;

        function setLang(lang) {
            if (!I18N[lang]) return;
            currentLang = lang;
            localStorage.setItem('agensea_lang', lang);
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLang);
            });
            document.getElementById('clientHeaderLabel').textContent = t('header_label');
            if (cachedRenderFn) cachedRenderFn();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Apply initial language state to header
            document.getElementById('clientHeaderLabel').textContent = t('header_label');
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLang);
                btn.addEventListener('click', () => setLang(btn.dataset.lang));
            });

            const hash = window.location.hash.slice(1);
            if (!hash) {
                showError();
                return;
            }

            let data;
            let editable = false;

            if (hash.startsWith('data:')) {
                // Legacy: base64-encoded data in URL
                try {
                    data = JSON.parse(decodeURIComponent(escape(atob(hash.slice(5)))));
                } catch (e) {
                    showError();
                    return;
                }
            } else {
                // Short token: fetch from Supabase
                if (!sb) {
                    showError();
                    return;
                }
                try {
                    const { data: row, error } = await sb.from('campaigns').select('data').eq('share_token', hash).single();
                    if (error || !row) {
                        showError();
                        return;
                    }
                    // Map campaign data to client format
                    const c = row.data;
                    shareToken = hash;
                    fullCampaign = c;
                    editable = true;
                    if (!c.businessKpis) c.businessKpis = { productValue: null, margin: null, goal: null, budget: null };
                    // Migrate legacy mustAlsoMatch string → structured blocks
                    if (Array.isArray(c.audiences)) {
                        c.audiences.forEach(a => {
                            if (!Array.isArray(a.mustAlsoMatchBlocks)) a.mustAlsoMatchBlocks = [];
                            if (typeof a.mustAlsoMatch === 'string' && a.mustAlsoMatch.trim()) {
                                a.mustAlsoMatch.split(/\n/).forEach(line => {
                                    const idx = line.indexOf(':');
                                    let attribute = '', values = '';
                                    if (idx === -1) values = line.trim();
                                    else { attribute = line.slice(0, idx).trim(); values = line.slice(idx + 1).trim(); }
                                    if (attribute || values) a.mustAlsoMatchBlocks.push({ attribute, values });
                                });
                                delete a.mustAlsoMatch;
                            }
                        });
                    }
                    data = {
                        n: c.name,
                        c: c.client,
                        sd: c.startDate,
                        ed: c.endDate,
                        ctx: c.context,
                        bk: c.businessKpis,
                        aud: Array.isArray(c.audiences) ? c.audiences : [],
                        kpis: c.kpis.map(k => ({ id: k.id, t: k.target, a: k.actual })),
                    };
                } catch (e) {
                    showError();
                    return;
                }
            }

            const main = document.getElementById('clientMain');

            // Re-renderable render function
            cachedRenderFn = () => renderReport(main, data, editable);
            renderReport(main, data, editable);
            document.title = `${data.n} — ${t('header_label')} — Agensea`;
        });

        function renderReport(main, data, editable) {
            // Hero
            let periodText = '';
            if (data.sd && data.ed) {
                periodText = `${formatDate(data.sd)} — ${formatDate(data.ed)}`;
            }

            let contextHtml = '';
            if (data.ctx) {
                const items = [];
                if (data.ctx.audienceSize) items.push({ label: t('ctx_audience'), value: data.ctx.audienceSize });
                if (data.ctx.budget) items.push({ label: t('ctx_budget'), value: data.ctx.budget });
                if (data.ctx.platform) items.push({ label: t('ctx_platform'), value: data.ctx.platform });
                if (items.length > 0) {
                    contextHtml = `<div class="client-context">${items.map(i =>
                        `<div class="client-ctx-item"><span class="client-ctx-label">${i.label}</span><span class="client-ctx-value">${i.value}</span></div>`
                    ).join('')}</div>`;
                }
            }

            // Calculate status counts
            let greens = 0, oranges = 0, reds = 0, total = 0;
            data.kpis.forEach(k => {
                const def = ALL_KPIS[k.id];
                if (!def || k.a === null) return;
                total++;
                const dev = calculateDeviation(k.a, k.t, def.direction);
                const cls = getStatusClass(dev);
                if (cls === 'green') greens++;
                else if (cls === 'orange') oranges++;
                else if (cls === 'red') reds++;
            });

            // Summary
            let badgeCls = '', badgeText = '', summaryText = '';
            const score = total > 0 ? greens / total : 0;
            if (total === 0) {
                badgeText = t('summary_no_data');
                summaryText = t('summary_no_data_text');
            } else if (score >= 0.8 && reds === 0) {
                badgeCls = 'good';
                badgeText = t('summary_good_badge');
                summaryText = t('summary_good', greens, total);
            } else if (reds >= 2 || score < 0.4) {
                badgeCls = 'critical';
                badgeText = t('summary_critical_badge');
                summaryText = t('summary_critical', reds);
            } else {
                badgeCls = 'warning';
                badgeText = t('summary_warning_badge');
                summaryText = t('summary_warning', greens, oranges + reds);
            }

            // Build table rows
            let tableRows = '';
            data.kpis.forEach(k => {
                const base = ALL_KPIS[k.id];
                if (!base) return;
                const def = localizedKpi(base);
                const dev = calculateDeviation(k.a, k.t, base.direction);
                const cls = getStatusClass(dev);
                const label = getStatusLabel(cls);

                let devFormatted = '—';
                let devCls = 'neutral-val';
                if (dev !== null) {
                    const sign = dev >= 0 ? '+' : '';
                    devFormatted = sign + dev.toFixed(1).replace('.', ',') + '%';
                    if (dev >= 0) devCls = 'positive';
                    else if (dev >= -20) devCls = 'warning';
                    else devCls = 'negative';
                }

                tableRows += `
                    <tr>
                        <td><span class="kpi-name">${def.name}</span><span class="kpi-unit">${def.unit}</span></td>
                        <td><span class="ro-value">${formatValue(k.t, base.format)}</span></td>
                        <td><span class="ro-value">${k.a !== null ? formatValue(k.a, base.format) : '—'}</span></td>
                        <td><span class="status-pill ${cls}"><span class="status-dot"></span>${label}</span></td>
                        <td><span class="deviation ${devCls}">${devFormatted}</span></td>
                    </tr>
                `;
            });

            // Audiences
            const audList = Array.isArray(data.aud) ? data.aud : [];
            let audiencesBlock = '';
            if (audList.length > 0) {
                const audFieldDefs = [
                    { key: 'location',     labelKey: 'audience_field_location' },
                    { key: 'jobFunctions', labelKey: 'audience_field_job_functions' },
                    { key: 'seniority',    labelKey: 'audience_field_seniority' },
                    { key: 'companySize',  labelKey: 'audience_field_company_size' },
                    { key: 'industry',     labelKey: 'audience_field_industry' },
                ];
                const cardsHtml = audList.map(a => {
                    const fieldsHtml = audFieldDefs.map(f => {
                        const val = a[f.key] || '';
                        if (!val) return '';
                        return `<div class="audience-field"><label class="label-small">${t(f.labelKey)}</label><div class="chip-row">${chips(val)}</div></div>`;
                    }).filter(Boolean).join('');
                    const footerParts = [];
                    if (a.estimatedSize) footerParts.push(`<div class="audience-field audience-field-small"><label class="label-small">${t('audience_estimated_size')}</label><div class="audience-plain">${escapeHtml(a.estimatedSize)}</div></div>`);
                    if (a.notes) footerParts.push(`<div class="audience-field audience-field-wide"><label class="label-small">${t('audience_notes')}</label><div class="audience-plain">${escapeHtml(a.notes)}</div></div>`);
                    const mamData = a.mustAlsoMatchBlocks && a.mustAlsoMatchBlocks.length ? a.mustAlsoMatchBlocks : a.mustAlsoMatch;
                    const mamRendered = renderMamBlocksRO(mamData);
                    const mamHtml = mamRendered ? `
                        <div class="audience-mam">
                            <label class="label-small">${t('mam_section_label')}</label>
                            <div class="mam-preview">${mamRendered}</div>
                        </div>
                    ` : '';
                    return `
                        <div class="audience-card audience-card-ro">
                            <div class="audience-card-header"><h3 class="audience-name-ro">${escapeHtml(a.name || t('audience_default_name'))}</h3></div>
                            <div class="audience-grid">${fieldsHtml}</div>
                            ${mamHtml}
                            ${footerParts.length ? `<div class="audience-footer">${footerParts.join('')}</div>` : ''}
                        </div>
                    `;
                }).join('');
                audiencesBlock = `
                    <section class="section-heading">
                        <h2 class="section-title">${t('audiences_title')}</h2>
                        <p class="section-subtitle">${t('audiences_subtitle_ro')}</p>
                    </section>
                    <section class="audiences-section">
                        <div class="audience-list" id="cliAudienceList">${cardsHtml}</div>
                        <div class="audience-actions"><button class="btn-secondary" id="cliDownloadAudiences">${t('btn_download_audiences')}</button></div>
                    </section>
                `;
            }

            // Business KPIs block
            const bk = data.bk || { productValue: null, margin: null, goal: null, budget: null };
            if (bk.margin === undefined) bk.margin = null;
            const bizValue = (v, fmt) => v !== null && v !== undefined ? formatValue(v, fmt) : '';
            const editAttr = editable ? '' : 'readonly';
            const bizBlock = `
                <section class="section-heading">
                    <h2 class="section-title">${t('biz_title')}</h2>
                    <p class="section-subtitle">${editable ? t('biz_subtitle_edit') : t('biz_subtitle_ro')}</p>
                </section>
                <section class="table-wrapper">
                    <table class="kpi-table biz-table">
                        <thead>
                            <tr>
                                <th style="width:22%">${t('biz_col_kpi')}</th>
                                <th style="width:22%">${t('biz_col_value')}</th>
                                <th>${t('biz_col_explanation')}</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><span class="kpi-name">${t('biz_row_product_value')}</span><span class="kpi-unit">${t('biz_row_product_value_unit')}</span></td>
                                <td><input type="text" id="cliBizProductValue" class="editable" placeholder="—" value="${bizValue(bk.productValue, 'currency')}" ${editAttr}></td>
                                <td><span class="explanation-text">${t('biz_row_product_value_exp')}</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">${t('biz_row_margin')}</span><span class="kpi-unit">${t('biz_row_margin_unit')}</span></td>
                                <td><input type="text" id="cliBizMargin" class="editable" placeholder="—" value="${bizValue(bk.margin, 'percentage')}" ${editAttr}></td>
                                <td><span class="explanation-text">${t('biz_row_margin_exp')}</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">${t('biz_row_goal')}</span><span class="kpi-unit">${t('biz_row_goal_unit')}</span></td>
                                <td><input type="text" id="cliBizGoal" class="editable" placeholder="—" value="${bizValue(bk.goal, 'number')}" ${editAttr}></td>
                                <td><span class="explanation-text">${t('biz_row_goal_exp')}</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">${t('biz_row_budget')}</span><span class="kpi-unit">${t('biz_row_budget_unit')}</span></td>
                                <td><input type="text" id="cliBizBudget" class="editable" placeholder="—" value="${bizValue(bk.budget, 'currency')}" ${editAttr}></td>
                                <td><span class="explanation-text">${t('biz_row_budget_exp')}</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">${t('biz_row_planned_cac')}</span><span class="kpi-unit">${t('biz_row_planned_cac_unit')}</span></td>
                                <td><span class="ro-value" id="cliBizPlannedCac">—</span></td>
                                <td><span class="explanation-text">${t('biz_row_planned_cac_exp')}</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">${t('biz_row_max_cac')}</span><span class="kpi-unit">${t('biz_row_max_cac_unit')}</span></td>
                                <td><span class="ro-value" id="cliBizMaxCac">—</span></td>
                                <td><span class="explanation-text">${t('biz_row_max_cac_exp')}</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">${t('biz_row_roas')}</span><span class="kpi-unit">${t('biz_row_roas_unit')}</span></td>
                                <td><span class="ro-value" id="cliBizRoas">—</span></td>
                                <td><span class="explanation-text">${t('biz_row_roas_exp')}</span></td>
                            </tr>
                        </tbody>
                    </table>
                    ${editable ? '<p class="biz-save-status" id="cliBizStatus"></p>' : ''}
                </section>
            `;

            main.innerHTML = `
                <div class="client-hero">
                    <div class="logo">agensea<span class="logo-accent">.</span></div>
                    ${data.c ? `<p class="client-subtitle">${data.c}</p>` : ''}
                    <h1 class="client-title">${data.n}</h1>
                    ${periodText ? `<p class="client-period">${periodText}</p>` : ''}
                    ${contextHtml}
                </div>

                ${audiencesBlock}

                ${bizBlock}

                <section class="summary-card">
                    <div class="summary-header">
                        <h2 class="summary-title">${t('summary_title')}</h2>
                        <div class="summary-badge ${badgeCls}">${badgeText}</div>
                    </div>
                    <p class="summary-text">${summaryText}</p>
                    <div class="summary-stats">
                        <div class="stat-item">
                            <span class="stat-value">${greens}</span>
                            <span class="stat-label status-green-text">${t('stat_on_target')}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${oranges}</span>
                            <span class="stat-label status-orange-text">${t('stat_attention')}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${reds}</span>
                            <span class="stat-label status-red-text">${t('stat_critical')}</span>
                        </div>
                    </div>
                </section>

                <section class="section-heading">
                    <h2 class="section-title">${t('campaign_kpis_title')}</h2>
                    <p class="section-subtitle">${t('campaign_kpis_subtitle')}</p>
                </section>

                <section class="table-wrapper">
                    <table class="kpi-table">
                        <thead>
                            <tr>
                                <th style="width:15%">${t('kpi_col_kpi')}</th>
                                <th style="width:15%">${t('kpi_col_target')}</th>
                                <th style="width:15%">${t('kpi_col_actual')}</th>
                                <th style="width:15%">${t('kpi_col_status')}</th>
                                <th style="width:15%">${t('kpi_col_deviation')}</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </section>

                <div class="client-footer">
                    <p>${t('footer_text')}</p>
                </div>
            `;

            // Download audiences as PNG
            const dlBtn = document.getElementById('cliDownloadAudiences');
            if (dlBtn) {
                dlBtn.addEventListener('click', async () => {
                    if (typeof html2canvas === 'undefined') return;
                    const el = document.getElementById('cliAudienceList');
                    if (!el) return;
                    try {
                        const canvas = await html2canvas(el, {
                            backgroundColor: getComputedStyle(document.body).backgroundColor || '#ffffff',
                            scale: 2,
                            useCORS: true,
                            logging: false,
                        });
                        const link = document.createElement('a');
                        const safe = (data.n || 'audiences').replace(/[^a-z0-9-_ ]/gi, '').trim() || 'audiences';
                        link.download = `audiences-${safe}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (e) { console.warn('PNG export failed:', e); }
                });
            }

            // ── Business KPI interactivity (inside renderReport) ──
            function updateBizDerived() {
                const plannedEl = document.getElementById('cliBizPlannedCac');
                const maxEl = document.getElementById('cliBizMaxCac');
                const roasEl = document.getElementById('cliBizRoas');

                let plannedCac = null;
                if (bk.budget && bk.goal && bk.goal > 0) {
                    plannedCac = bk.budget / bk.goal;
                    plannedEl.textContent = formatValue(plannedCac, 'currency');
                } else {
                    plannedEl.textContent = '—';
                }

                let maxCac = null;
                if (bk.productValue && bk.margin && bk.margin > 0) {
                    maxCac = bk.productValue * (bk.margin / 100);
                    maxEl.textContent = formatValue(maxCac, 'currency');
                } else {
                    maxEl.textContent = '—';
                }

                plannedEl.classList.remove('biz-cac-ok', 'biz-cac-over');
                if (plannedCac !== null && maxCac !== null) {
                    plannedEl.classList.add(plannedCac <= maxCac ? 'biz-cac-ok' : 'biz-cac-over');
                }

                if (bk.productValue && bk.goal && bk.budget && bk.budget > 0) {
                    const roas = (bk.goal * bk.productValue) / bk.budget;
                    roasEl.textContent = roas.toFixed(2).replace('.', ',') + '×';
                } else {
                    roasEl.textContent = '—';
                }
            }
            updateBizDerived();

            if (editable) {
                const fields = [
                    { id: 'cliBizProductValue', key: 'productValue', format: 'currency' },
                    { id: 'cliBizMargin', key: 'margin', format: 'percentage' },
                    { id: 'cliBizGoal', key: 'goal', format: 'number' },
                    { id: 'cliBizBudget', key: 'budget', format: 'currency' },
                ];
                const statusEl = document.getElementById('cliBizStatus');
                fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    el.addEventListener('focus', (e) => {
                        const raw = bk[f.key];
                        e.target.value = raw !== null && raw !== undefined ? raw : '';
                        e.target.select();
                    });
                    el.addEventListener('blur', async (e) => {
                        const parsed = parseValue(e.target.value);
                        bk[f.key] = parsed;
                        fullCampaign.businessKpis = bk;
                        e.target.value = parsed !== null ? formatValue(parsed, f.format) : '';
                        updateBizDerived();
                        statusEl.textContent = t('save_saving');
                        statusEl.className = 'biz-save-status saving';
                        const ok = await saveBusinessKpis();
                        statusEl.textContent = ok ? t('save_saved') : t('save_failed');
                        statusEl.className = 'biz-save-status ' + (ok ? 'saved' : 'error');
                        setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'biz-save-status'; }, 2500);
                    });
                    el.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.target.blur(); });
                });
            }
        }

        // Error state translation helper
        function showError() {
            document.getElementById('clientError').style.display = '';
            document.getElementById('clientErrorTitle').textContent = t('error_title');
            document.getElementById('clientErrorDesc').textContent = t('error_desc');
        }
    </script>
</body>
</html>
