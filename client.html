<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campagne Rapportage — Agensea</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Client portal overrides */
        .client-hero {
            text-align: center;
            padding: 48px 40px 32px;
        }
        .client-hero .logo {
            font-size: 1rem;
            margin-bottom: 24px;
            color: var(--muted);
        }
        .client-title {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
        }
        .client-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .client-period {
            font-size: 0.75rem;
            color: var(--muted);
        }
        .client-context {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        .client-ctx-item {
            text-align: center;
        }
        .client-ctx-label {
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            display: block;
            margin-bottom: 2px;
        }
        .client-ctx-value {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
        }
        /* Read-only table: no editable styling */
        .kpi-table .ro-value {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.9rem;
            font-variant-numeric: tabular-nums;
        }
        .client-footer {
            text-align: center;
            padding: 40px 20px 60px;
        }
        .client-footer p {
            font-size: 0.7rem;
            color: var(--muted);
        }
        .client-error {
            text-align: center;
            padding: 120px 40px;
        }
        .client-error h2 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        .client-error p {
            color: var(--text-secondary);
        }

        @media print {
            .header { display: none !important; }
            .client-hero { padding-top: 0; }
            .client-footer { display: none; }
        }
    </style>
</head>
<body>

    <div class="grain"></div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">agensea<span class="logo-accent">.</span></div>
            <div class="header-label">Campagne Rapportage</div>
        </div>
    </header>

    <main class="main" id="clientMain">
        <div class="client-error" id="clientError" style="display:none;">
            <h2>Geen rapportage gevonden</h2>
            <p>Deze link bevat geen geldige campagnedata. Neem contact op met je accountmanager.</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://lkyyggkzdptfvlgwjeur.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxreXlnZ2t6ZHB0ZnZsZ3dqZXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2MTk5MDAsImV4cCI6MjA5MTE5NTkwMH0.JSQtJRXVaoF5y6C1G8GPdI21cpqJ8_-wr1Def8tcs-Q';
        const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // ── KPI Definitions (all possible) ──
        const ALL_KPIS = {
            ctr: { id: 'ctr', name: 'CTR', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            cpc: { id: 'cpc', name: 'CPC', unit: '€', format: 'currency', direction: 'lower_is_better' },
            cpm: { id: 'cpm', name: 'CPM', unit: '€', format: 'currency', direction: 'lower_is_better' },
            conversieratio: { id: 'conversieratio', name: 'Conversieratio', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            cpl: { id: 'cpl', name: 'CPL', unit: '€', format: 'currency', direction: 'lower_is_better' },
            video_view_rate: { id: 'video_view_rate', name: 'Video view rate', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            engagement_rate: { id: 'engagement_rate', name: 'Engagement rate', unit: '%', format: 'percentage', direction: 'higher_is_better' },
            volgers: { id: 'volgers', name: 'Nieuwe volgers', unit: 'volgers', format: 'number', direction: 'higher_is_better' },
            cpv: { id: 'cpv', name: 'CPV', unit: '€', format: 'currency', direction: 'lower_is_better' },
            bounce_rate: { id: 'bounce_rate', name: 'Bouncepercentage', unit: '%', format: 'percentage', direction: 'lower_is_better' },
            time_on_page: { id: 'time_on_page', name: 'Tijd op pagina', unit: 'sec', format: 'number', direction: 'higher_is_better' },
        };

        function formatValue(value, format) {
            if (value === null || value === undefined) return '—';
            switch (format) {
                case 'number': return Number(value).toLocaleString('nl-NL');
                case 'percentage': return Number(value).toFixed(2).replace('.', ',') + '%';
                case 'currency': return '€ ' + Number(value).toFixed(2).replace('.', ',');
                default: return String(value);
            }
        }

        function calculateDeviation(actual, target, direction) {
            if (actual === null || target === null || target === 0) return null;
            if (direction === 'higher_is_better') return ((actual - target) / target) * 100;
            return ((target - actual) / target) * 100;
        }

        function getStatusClass(dev) {
            if (dev === null) return 'neutral';
            if (dev >= 0) return 'green';
            if (dev >= -20) return 'orange';
            return 'red';
        }

        function getStatusLabel(cls) {
            return { green: 'Op target', orange: 'Aandacht', red: 'Kritiek', neutral: 'Geen data' }[cls];
        }

        function parseValue(str) {
            if (!str || str === '—') return null;
            let cleaned = String(str).replace(/[€%×\s]/g, '');
            const lastDot = cleaned.lastIndexOf('.');
            const lastComma = cleaned.lastIndexOf(',');
            if (lastComma > lastDot) cleaned = cleaned.replace(/\./g, '').replace(',', '.');
            else if (lastDot > lastComma) cleaned = cleaned.replace(/,/g, '');
            else cleaned = cleaned.replace(',', '.');
            const num = parseFloat(cleaned);
            return isNaN(num) ? null : num;
        }

        function formatDate(str) {
            if (!str) return '';
            return new Date(str).toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        // State for write-back
        let shareToken = null;
        let fullCampaign = null;

        async function saveBusinessKpis() {
            if (!sb || !shareToken || !fullCampaign) return false;
            try {
                const { error } = await sb.from('campaigns')
                    .update({ data: fullCampaign, updated_at: new Date().toISOString() })
                    .eq('share_token', shareToken);
                if (error) { console.warn('Save failed:', error); return false; }
                return true;
            } catch (e) { console.warn('Save failed:', e); return false; }
        }

        // ── Parse & Render ──
        document.addEventListener('DOMContentLoaded', async () => {
            const hash = window.location.hash.slice(1);
            if (!hash) {
                document.getElementById('clientError').style.display = '';
                return;
            }

            let data;
            let editable = false;

            if (hash.startsWith('data:')) {
                // Legacy: base64-encoded data in URL
                try {
                    data = JSON.parse(decodeURIComponent(escape(atob(hash.slice(5)))));
                } catch (e) {
                    document.getElementById('clientError').style.display = '';
                    return;
                }
            } else {
                // Short token: fetch from Supabase
                if (!sb) {
                    document.getElementById('clientError').style.display = '';
                    return;
                }
                try {
                    const { data: row, error } = await sb.from('campaigns').select('data').eq('share_token', hash).single();
                    if (error || !row) {
                        document.getElementById('clientError').style.display = '';
                        return;
                    }
                    // Map campaign data to client format
                    const c = row.data;
                    shareToken = hash;
                    fullCampaign = c;
                    editable = true;
                    if (!c.businessKpis) c.businessKpis = { productValue: null, goal: null, budget: null };
                    data = {
                        n: c.name,
                        c: c.client,
                        sd: c.startDate,
                        ed: c.endDate,
                        ctx: c.context,
                        bk: c.businessKpis,
                        aud: Array.isArray(c.audiences) ? c.audiences : [],
                        kpis: c.kpis.map(k => ({ id: k.id, t: k.target, a: k.actual })),
                    };
                } catch (e) {
                    document.getElementById('clientError').style.display = '';
                    return;
                }
            }

            const main = document.getElementById('clientMain');

            // Hero
            let periodText = '';
            if (data.sd && data.ed) {
                periodText = `${formatDate(data.sd)} — ${formatDate(data.ed)}`;
            }

            let contextHtml = '';
            if (data.ctx) {
                const items = [];
                if (data.ctx.audienceSize) items.push({ label: 'Doelgroep', value: data.ctx.audienceSize });
                if (data.ctx.budget) items.push({ label: 'Budget', value: data.ctx.budget });
                if (data.ctx.platform) items.push({ label: 'Platform', value: data.ctx.platform });
                if (items.length > 0) {
                    contextHtml = `<div class="client-context">${items.map(i =>
                        `<div class="client-ctx-item"><span class="client-ctx-label">${i.label}</span><span class="client-ctx-value">${i.value}</span></div>`
                    ).join('')}</div>`;
                }
            }

            // Calculate status counts
            let greens = 0, oranges = 0, reds = 0, total = 0;
            data.kpis.forEach(k => {
                const def = ALL_KPIS[k.id];
                if (!def || k.a === null) return;
                total++;
                const dev = calculateDeviation(k.a, k.t, def.direction);
                const cls = getStatusClass(dev);
                if (cls === 'green') greens++;
                else if (cls === 'orange') oranges++;
                else if (cls === 'red') reds++;
            });

            // Summary
            let badgeCls = '', badgeText = '', summaryText = '';
            const score = total > 0 ? greens / total : 0;
            if (total === 0) {
                badgeText = 'Geen data';
                summaryText = 'Er zijn nog geen werkelijke resultaten ingevuld.';
            } else if (score >= 0.8 && reds === 0) {
                badgeCls = 'good';
                badgeText = 'Goed op koers';
                summaryText = `De campagne presteert sterk. ${greens} van de ${total} KPI's zitten op of boven target.`;
            } else if (reds >= 2 || score < 0.4) {
                badgeCls = 'critical';
                badgeText = 'Actie vereist';
                summaryText = `De campagne vraagt aandacht. ${reds} KPI('s) scoren onder target.`;
            } else {
                badgeCls = 'warning';
                badgeText = 'Aandachtspunten';
                summaryText = `De campagne presteert gemiddeld. ${greens} KPI('s) op target, ${oranges + reds} vragen aandacht.`;
            }

            // Build table rows
            let tableRows = '';
            data.kpis.forEach(k => {
                const def = ALL_KPIS[k.id];
                if (!def) return;

                const dev = calculateDeviation(k.a, k.t, def.direction);
                const cls = getStatusClass(dev);
                const label = getStatusLabel(cls);

                let devFormatted = '—';
                let devCls = 'neutral-val';
                if (dev !== null) {
                    const sign = dev >= 0 ? '+' : '';
                    devFormatted = sign + dev.toFixed(1).replace('.', ',') + '%';
                    if (dev >= 0) devCls = 'positive';
                    else if (dev >= -20) devCls = 'warning';
                    else devCls = 'negative';
                }

                tableRows += `
                    <tr>
                        <td><span class="kpi-name">${def.name}</span><span class="kpi-unit">${def.unit}</span></td>
                        <td><span class="ro-value">${formatValue(k.t, def.format)}</span></td>
                        <td><span class="ro-value">${k.a !== null ? formatValue(k.a, def.format) : '—'}</span></td>
                        <td><span class="status-pill ${cls}"><span class="status-dot"></span>${label}</span></td>
                        <td><span class="deviation ${devCls}">${devFormatted}</span></td>
                    </tr>
                `;
            });

            // Audiences block (read-only)
            function escapeHtml(str) {
                return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
            }
            function chips(str) {
                if (!str) return '';
                return String(str).split(/[,;\n]/).map(s => s.trim()).filter(Boolean)
                    .map(t => `<span class="chip">${escapeHtml(t)}</span>`).join('');
            }
            function parseMam(str) {
                if (!str) return [];
                return String(str).split(/\n/).map(line => {
                    const idx = line.indexOf(':');
                    if (idx === -1) {
                        const trimmed = line.trim();
                        if (!trimmed) return null;
                        return { label: '', values: trimmed.split(/[,;]/).map(s => s.trim()).filter(Boolean) };
                    }
                    const label = line.slice(0, idx).trim();
                    const values = line.slice(idx + 1).split(/[,;]/).map(s => s.trim()).filter(Boolean);
                    if (!label && values.length === 0) return null;
                    return { label, values };
                }).filter(Boolean);
            }
            function mamBlocks(str) {
                const blocks = parseMam(str);
                if (blocks.length === 0) return '';
                return blocks.map(b => `
                    <div class="mam-block">
                        ${b.label ? `<span class="mam-label">${escapeHtml(b.label)}</span>` : ''}
                        <div class="chip-row">${b.values.map(v => `<span class="chip">${escapeHtml(v)}</span>`).join('')}</div>
                    </div>
                `).join('');
            }
            const audList = Array.isArray(data.aud) ? data.aud : [];
            let audiencesBlock = '';
            if (audList.length > 0) {
                const audFieldDefs = [
                    { key: 'location',     label: 'Locatie' },
                    { key: 'jobFunctions', label: 'Functies / titels' },
                    { key: 'seniority',    label: 'Senioriteit' },
                    { key: 'companySize',  label: 'Bedrijfsgrootte' },
                    { key: 'industry',     label: 'Branche' },
                ];
                const cardsHtml = audList.map(a => {
                    const fieldsHtml = audFieldDefs.map(f => {
                        const val = a[f.key] || '';
                        if (!val) return '';
                        return `<div class="audience-field"><label class="label-small">${f.label.toUpperCase()}</label><div class="chip-row">${chips(val)}</div></div>`;
                    }).filter(Boolean).join('');
                    const footerParts = [];
                    if (a.estimatedSize) footerParts.push(`<div class="audience-field audience-field-small"><label class="label-small">GESCHATTE GROOTTE</label><div class="audience-plain">${escapeHtml(a.estimatedSize)}</div></div>`);
                    if (a.notes) footerParts.push(`<div class="audience-field audience-field-wide"><label class="label-small">UITSLUITINGEN / NOTITIES</label><div class="audience-plain">${escapeHtml(a.notes)}</div></div>`);
                    const mamHtml = a.mustAlsoMatch ? `
                        <div class="audience-mam">
                            <label class="label-small">MOET OOK VOLDOEN AAN</label>
                            <div class="mam-preview">${mamBlocks(a.mustAlsoMatch)}</div>
                        </div>
                    ` : '';
                    return `
                        <div class="audience-card audience-card-ro">
                            <div class="audience-card-header"><h3 class="audience-name-ro">${escapeHtml(a.name || 'Doelgroep')}</h3></div>
                            <div class="audience-grid">${fieldsHtml}</div>
                            ${mamHtml}
                            ${footerParts.length ? `<div class="audience-footer">${footerParts.join('')}</div>` : ''}
                        </div>
                    `;
                }).join('');
                audiencesBlock = `
                    <section class="section-heading">
                        <h2 class="section-title">Doelgroepen</h2>
                        <p class="section-subtitle">De targeting die in deze campagne wordt gebruikt.</p>
                    </section>
                    <section class="audiences-section">
                        <div class="audience-list">${cardsHtml}</div>
                    </section>
                `;
            }

            // Business KPIs block — matches Campaign KPIs table styling
            const bk = data.bk || { productValue: null, margin: null, goal: null, budget: null };
            if (bk.margin === undefined) bk.margin = null;
            const bizValue = (v, fmt) => v !== null && v !== undefined ? formatValue(v, fmt) : '';
            const editAttr = editable ? '' : 'readonly';
            const bizBlock = `
                <section class="section-heading">
                    <h2 class="section-title">Business KPI's</h2>
                    <p class="section-subtitle">${editable ? 'Vul hieronder je commerciële doelen in. Max. CAC en ROAS-target worden automatisch berekend.' : 'Commerciële doelen van de campagne. Max. CAC en ROAS-target worden automatisch berekend.'}</p>
                </section>
                <section class="table-wrapper">
                    <table class="kpi-table biz-table">
                        <thead>
                            <tr>
                                <th style="width:22%">Business KPI</th>
                                <th style="width:22%">Waarde</th>
                                <th>Uitleg</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><span class="kpi-name">Productwaarde</span><span class="kpi-unit">€ per sale/lead</span></td>
                                <td><input type="text" id="cliBizProductValue" class="editable" placeholder="—" value="${bizValue(bk.productValue, 'currency')}" ${editAttr}></td>
                                <td><span class="explanation-text">Wat levert één nieuwe klant, sale of lead je gemiddeld op? Bijvoorbeeld: een cursus van € 500, of een contract van € 2.000 per jaar.</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">Winstmarge</span><span class="kpi-unit">% (optioneel)</span></td>
                                <td><input type="text" id="cliBizMargin" class="editable" placeholder="—" value="${bizValue(bk.margin, 'percentage')}" ${editAttr}></td>
                                <td><span class="explanation-text">Jouw bruto winstmarge op de productwaarde — dus wat er per klant overblijft na inkoop/productkosten, vóór advertentiekosten. Vind je dit te gevoelig om te delen? Laat 'm gewoon leeg — dan tonen we de Max. CAC niet, en werken we alleen met de Geplande CAC en ROAS.</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">Doel</span><span class="kpi-unit">aantal</span></td>
                                <td><input type="text" id="cliBizGoal" class="editable" placeholder="—" value="${bizValue(bk.goal, 'number')}" ${editAttr}></td>
                                <td><span class="explanation-text">Hoeveel nieuwe sales of leads wil je uit deze campagne halen? Dit is je zakelijke doelstelling — bijv. 25 nieuwe klanten.</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">Totaal campagnebudget</span><span class="kpi-unit">€</span></td>
                                <td><input type="text" id="cliBizBudget" class="editable" placeholder="—" value="${bizValue(bk.budget, 'currency')}" ${editAttr}></td>
                                <td><span class="explanation-text">Het totale advertentiebudget voor de volledige looptijd van deze campagne. Bijv. 3 maanden × € 2.500 = € 7.500. Dit vormt de basis voor CAC en ROAS.</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">Geplande CAC</span><span class="kpi-unit">€ per klant</span></td>
                                <td><span class="ro-value" id="cliBizPlannedCac">—</span></td>
                                <td><span class="explanation-text"><strong>Customer Acquisition Cost</strong> — wat je op basis van dit plan per nieuwe klant uitgeeft. Berekend als Budget ÷ Doel. Dit is je <em>verwachte</em> kost per klant.</span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">Max. CAC</span><span class="kpi-unit">€ per klant</span></td>
                                <td><span class="ro-value" id="cliBizMaxCac">—</span></td>
                                <td><span class="explanation-text">Het <strong>absolute plafond</strong>: tot hier kun je per klant uitgeven voordat je verlies draait. Berekend als Productwaarde × Winstmarge. Ligt je Geplande CAC erboven → verlies. Eronder → winst. <em>Alleen zichtbaar als je winstmarge invult.</em></span></td>
                            </tr>
                            <tr>
                                <td><span class="kpi-name">ROAS-target</span><span class="kpi-unit">×</span></td>
                                <td><span class="ro-value" id="cliBizRoas">—</span></td>
                                <td><span class="explanation-text"><strong>Return on Ad Spend</strong> — hoeveel euro omzet je terugverdient per euro advertentiebudget. Een ROAS van 3× betekent: voor elke € 1 ad-kosten komt er € 3 omzet binnen.</span></td>
                            </tr>
                        </tbody>
                    </table>
                    ${editable ? '<p class="biz-save-status" id="cliBizStatus"></p>' : ''}
                </section>
            `;

            main.innerHTML = `
                <div class="client-hero">
                    <div class="logo">agensea<span class="logo-accent">.</span></div>
                    ${data.c ? `<p class="client-subtitle">${data.c}</p>` : ''}
                    <h1 class="client-title">${data.n}</h1>
                    ${periodText ? `<p class="client-period">${periodText}</p>` : ''}
                    ${contextHtml}
                </div>

                ${audiencesBlock}

                ${bizBlock}

                <section class="summary-card">
                    <div class="summary-header">
                        <h2 class="summary-title">Samenvatting</h2>
                        <div class="summary-badge ${badgeCls}">${badgeText}</div>
                    </div>
                    <p class="summary-text">${summaryText}</p>
                    <div class="summary-stats">
                        <div class="stat-item">
                            <span class="stat-value">${greens}</span>
                            <span class="stat-label status-green-text">Op target</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${oranges}</span>
                            <span class="stat-label status-orange-text">Aandachtspunt</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value">${reds}</span>
                            <span class="stat-label status-red-text">Kritiek</span>
                        </div>
                    </div>
                </section>

                <section class="section-heading">
                    <h2 class="section-title">Campaign KPI's</h2>
                    <p class="section-subtitle">Prestaties van de advertentiecampagne.</p>
                </section>

                <section class="table-wrapper">
                    <table class="kpi-table">
                        <thead>
                            <tr>
                                <th style="width:15%">KPI</th>
                                <th style="width:15%">Target</th>
                                <th style="width:15%">Werkelijk</th>
                                <th style="width:15%">Status</th>
                                <th style="width:15%">Afwijking</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </section>

                <div class="client-footer">
                    <p>Rapportage opgesteld door <strong>Agensea</strong> — Voor vragen, neem contact op met je accountmanager.</p>
                </div>
            `;

            // Update page title
            document.title = `${data.n} — Rapportage — Agensea`;

            // ── Business KPI interactivity ──
            function updateBizDerived() {
                const plannedEl = document.getElementById('cliBizPlannedCac');
                const maxEl = document.getElementById('cliBizMaxCac');
                const roasEl = document.getElementById('cliBizRoas');

                let plannedCac = null;
                if (bk.budget && bk.goal && bk.goal > 0) {
                    plannedCac = bk.budget / bk.goal;
                    plannedEl.textContent = formatValue(plannedCac, 'currency');
                } else {
                    plannedEl.textContent = '—';
                }

                let maxCac = null;
                if (bk.productValue && bk.margin && bk.margin > 0) {
                    maxCac = bk.productValue * (bk.margin / 100);
                    maxEl.textContent = formatValue(maxCac, 'currency');
                } else {
                    maxEl.textContent = '—';
                }

                plannedEl.classList.remove('biz-cac-ok', 'biz-cac-over');
                if (plannedCac !== null && maxCac !== null) {
                    plannedEl.classList.add(plannedCac <= maxCac ? 'biz-cac-ok' : 'biz-cac-over');
                }

                if (bk.productValue && bk.goal && bk.budget && bk.budget > 0) {
                    const roas = (bk.goal * bk.productValue) / bk.budget;
                    roasEl.textContent = roas.toFixed(2).replace('.', ',') + '×';
                } else {
                    roasEl.textContent = '—';
                }
            }
            updateBizDerived();

            if (editable) {
                const fields = [
                    { id: 'cliBizProductValue', key: 'productValue', format: 'currency' },
                    { id: 'cliBizMargin', key: 'margin', format: 'percentage' },
                    { id: 'cliBizGoal', key: 'goal', format: 'number' },
                    { id: 'cliBizBudget', key: 'budget', format: 'currency' },
                ];
                const statusEl = document.getElementById('cliBizStatus');
                fields.forEach(f => {
                    const el = document.getElementById(f.id);
                    el.addEventListener('focus', (e) => {
                        const raw = bk[f.key];
                        e.target.value = raw !== null && raw !== undefined ? raw : '';
                        e.target.select();
                    });
                    el.addEventListener('blur', async (e) => {
                        const parsed = parseValue(e.target.value);
                        bk[f.key] = parsed;
                        fullCampaign.businessKpis = bk;
                        e.target.value = parsed !== null ? formatValue(parsed, f.format) : '';
                        updateBizDerived();
                        statusEl.textContent = 'Opslaan…';
                        statusEl.className = 'biz-save-status saving';
                        const ok = await saveBusinessKpis();
                        statusEl.textContent = ok ? 'Opgeslagen ✓' : 'Opslaan mislukt';
                        statusEl.className = 'biz-save-status ' + (ok ? 'saved' : 'error');
                        setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'biz-save-status'; }, 2500);
                    });
                    el.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.target.blur(); });
                });
            }
        });
    </script>
</body>
</html>
